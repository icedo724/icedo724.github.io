<header>
  <div>
    <a class="site-title" href="{{ site.url }}">{{ site.title }}</a>
    <small>
      {% if site.tagshort %}
      {{ site.tagshort }}
      {% else %}
      {{ site.taglong }}
      {% endif %}
    </small>
  </div>
  <nav style="display:flex; align-items:center; gap:16px;">
    <a href="/projects/" style="font-size:0.85em; opacity:0.75; text-decoration:none;">Projects</a>
    <a href="/cv/" style="font-size:0.85em; opacity:0.75; text-decoration:none;">CV</a>
    <a id="theme-toggle" class="toggle-icon" onclick="modeSwitcher()"></a>
  </nav>
</header>
